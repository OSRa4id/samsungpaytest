<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Samsung Pay — Integration Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #1428a0; /* Samsung Blue */
      --accent-light: #1a35cc;
      --gold: #f5a623;
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --success: #00d68f;
      --error: #ff4d6a;
      --warn: #f5a623;
      --mono: 'IBM Plex Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      gap: 32px;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    /* ── Header ── */
    header {
      text-align: center;
      position: relative; z-index: 1;
    }
    header .eyebrow {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    header h1 {
      font-family: var(--display);
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    header h1 span { color: var(--accent-light); }
    header .badge {
      display: inline-block;
      margin-top: 12px;
      background: rgba(245,166,35,0.12);
      border: 1px solid rgba(245,166,35,0.3);
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 4px 12px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    /* ── Main card ── */
    .card {
      width: 100%;
      max-width: 580px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      position: relative; z-index: 1;
    }
    .card-title {
      font-family: var(--display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent-light);
      border-radius: 50%;
      display: inline-block;
    }

    /* Config fields */
    .field-group { display: flex; flex-direction: column; gap: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent-light); }
    .field input::placeholder { color: var(--muted); }

    /* Amount row */
    .amount-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ── Samsung Pay Button ── */
    .spay-btn-wrap {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #samsung-pay-btn {
      width: 220px;
      height: 48px;
      cursor: pointer;
      border: none;
      background: transparent;
      padding: 0;
      transition: transform 0.15s, filter 0.15s;
    }
    #samsung-pay-btn:hover { transform: scale(1.03); filter: brightness(1.1); }
    #samsung-pay-btn:active { transform: scale(0.97); }
    #samsung-pay-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Official-style Samsung Pay button SVG replica */
    #samsung-pay-btn svg { width: 100%; height: 100%; }

    .btn-hint {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── Status Bar ── */
    #status-bar {
      width: 100%;
      max-width: 580px;
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 12px;
      letter-spacing: 0.04em;
      position: relative; z-index: 1;
      transition: all 0.3s;
    }
    #status-bar.show { display: flex; }
    #status-bar.info    { background: rgba(20,40,160,0.15); border: 1px solid rgba(20,40,160,0.4); color: #7ba7ff; }
    #status-bar.success { background: rgba(0,214,143,0.1);  border: 1px solid rgba(0,214,143,0.3); color: var(--success); }
    #status-bar.error   { background: rgba(255,77,106,0.1); border: 1px solid rgba(255,77,106,0.3); color: var(--error); }
    #status-bar.warn    { background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.3); color: var(--gold); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .info .status-dot    { background: #7ba7ff; animation: pulse 1.8s infinite; }
    .success .status-dot { background: var(--success); }
    .error .status-dot   { background: var(--error); }
    .warn .status-dot    { background: var(--gold); }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* ── Log Panel ── */
    .log-card {
      width: 100%;
      max-width: 580px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: relative; z-index: 1;
    }
    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }
    .log-title {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex; align-items: center; gap: 8px;
    }
    .log-live { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
    .log-clear {
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--mono);
      transition: color 0.2s, border-color 0.2s;
    }
    .log-clear:hover { color: var(--text); border-color: var(--muted); }

    #log {
      background: #07070c;
      padding: 16px 20px;
      font-size: 12px;
      line-height: 1.8;
      min-height: 180px;
      max-height: 420px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: #9090b8;
    }
    #log::-webkit-scrollbar { width: 6px; }
    #log::-webkit-scrollbar-track { background: transparent; }
    #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .log-ts { color: var(--muted); }
    .log-ok  { color: var(--success); }
    .log-err { color: var(--error); }
    .log-info { color: #7ba7ff; }
    .log-data { color: #d4c4ff; }
    .log-warn { color: var(--gold); }

    /* ── SDK load indicator ── */
    #sdk-status {
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }

    footer {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-align: center;
      position: relative; z-index: 1;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">Noqodi · Payment Gateway</p>
    <h1>Samsung Pay <span>Integration</span></h1>
    <span class="badge">⚠ Staging · STAGE_WITHOUT_APK</span>
  </header>

  <!-- Config Card -->
  <div class="card">
    <p class="card-title">Service Configuration</p>
    <div class="field-group">
      <div class="field">
        <label>Service ID</label>
        <input id="service-id" type="text" placeholder="e.g. 7281af04e0d34..." value="" />
      </div>
      <div class="field">
        <label>Merchant Name</label>
        <input id="merchant-name" type="text" placeholder="e.g. Noqodi Test Store" value="Noqodi Test Store" />
      </div>
      <div class="amount-row">
        <div class="field">
          <label>Amount</label>
          <input id="amount" type="number" min="0.01" step="0.01" placeholder="10.00" value="10.00" />
        </div>
        <div class="field">
          <label>Currency</label>
          <select id="currency">
            <option value="AED">AED</option>
            <option value="SAR">SAR</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="EGP">EGP</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Order Reference</label>
        <input id="order-ref" type="text" placeholder="auto-generated" value="" />
      </div>
    </div>

    <!-- Samsung Pay Button -->
    <div class="spay-btn-wrap">
      <button id="samsung-pay-btn" disabled title="Pay with Samsung Pay">
        <!-- Official-style Samsung Pay button -->
        <svg viewBox="0 0 240 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="240" height="56" rx="6" fill="#1428A0"/>
          <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
                font-family="'Syne', sans-serif" font-size="17" font-weight="700"
                fill="white" letter-spacing="-0.3">Samsung Pay</text>
          <!-- Samsung Pay wave mark -->
          <path d="M22 28 Q26 20 30 28 Q34 36 38 28" stroke="white" stroke-width="2.2"
                stroke-linecap="round" fill="none" opacity="0.9"/>
          <path d="M26 28 Q29 23 32 28 Q35 33 38 28" stroke="white" stroke-width="1.6"
                stroke-linecap="round" fill="none" opacity="0.6"/>
        </svg>
      </button>
      <div id="sdk-status" style="color:var(--muted)">
        <span id="sdk-dot" style="width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block"></span>
        Loading Samsung Pay SDK…
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div id="status-bar">
    <span class="status-dot"></span>
    <span id="status-msg"></span>
  </div>

  <!-- Log Panel -->
  <div class="log-card">
    <div class="log-header">
      <span class="log-title">
        <span class="log-live"></span>
        Payment Credential Log
      </span>
      <button class="log-clear" onclick="clearLog()">clear</button>
    </div>
    <div id="log"><span class="log-ts">[init]</span> <span class="log-info">Waiting for SDK…</span>
</div>
  </div>

  <footer>
    Samsung Pay Web Checkout SDK · Staging Environment<br>
    Credentials are logged here — no server call made
  </footer>

  <!-- Samsung Pay Web SDK -->
  <script src="https://img.mpay.samsung.com/gsmpi/sdk/samsungpay_web_sdk.js"></script>

  <script>
    // ─── Helpers ───────────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);

    function ts() {
      return new Date().toLocaleTimeString('en-GB', { hour12: false });
    }

    function log(msg, type = 'info') {
      const el = $('log');
      const classMap = { info: 'log-info', ok: 'log-ok', err: 'log-err', data: 'log-data', warn: 'log-warn' };
      el.innerHTML += `<span class="log-ts">[${ts()}]</span> <span class="${classMap[type] || 'log-info'}">${escHtml(msg)}</span>\n`;
      el.scrollTop = el.scrollHeight;
    }

    function logJSON(label, obj) {
      log(label + ':', 'ok');
      const lines = JSON.stringify(obj, null, 2).split('\n');
      lines.forEach(l => {
        $('log').innerHTML += `<span class="log-data">  ${escHtml(l)}</span>\n`;
      });
      $('log').scrollTop = $('log').scrollHeight;
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function setStatus(msg, type = 'info') {
      const bar = $('status-bar');
      bar.className = 'show ' + type;
      $('status-msg').textContent = msg;
    }

    function clearLog() {
      $('log').innerHTML = `<span class="log-ts">[clear]</span> <span class="log-info">Log cleared.</span>\n`;
    }

    function genRef() {
      return 'ORD-' + Date.now() + '-' + Math.random().toString(36).slice(2,6).toUpperCase();
    }

    // ─── SDK Init ──────────────────────────────────────────────────────────────
    window.addEventListener('load', () => {
      // Pre-fill order ref
      $('order-ref').placeholder = genRef();

      if (typeof SamsungPay === 'undefined') {
        setSdkStatus('SDK failed to load', 'error');
        log('Samsung Pay SDK script failed to load. Check network / domain allowlist.', 'err');
        return;
      }

      setSdkStatus('SDK loaded ✓', 'ok');
      log('Samsung Pay SDK loaded successfully.', 'ok');
      initSamsungPay();
    });

    function setSdkStatus(msg, type) {
      const wrap = $('sdk-status');
      const dot  = $('sdk-dot');
      const colors = { ok: 'var(--success)', error: 'var(--error)', loading: 'var(--muted)' };
      dot.style.background = colors[type] || colors.loading;
      wrap.style.color = colors[type] || colors.loading;
      wrap.childNodes[1] && (wrap.childNodes[1].textContent === undefined
        ? null
        : wrap.lastChild.textContent = ' ' + msg);
      wrap.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:${colors[type]||colors.loading};display:inline-block"></span> ${escHtml(msg)}`;
    }

    // ─── Samsung Pay Init ──────────────────────────────────────────────────────
    function initSamsungPay() {
      const serviceId = $('service-id').value.trim();
      if (!serviceId) {
        log('No Service ID entered — button enabled in demo mode. Enter your Service ID first.', 'warn');
        setStatus('Enter your Samsung Pay Service ID above', 'warn');
      }

      // Enable the button regardless — isReadyToPay will gate it properly
      $('samsung-pay-btn').disabled = false;

      log('Calling SamsungPay.connect()…', 'info');

      try {
        SamsungPay.connect(
          serviceId || 'DEMO_SERVICE_ID',        // serviceId
          'TEST',                                 // serviceType: TEST = staging
          'STAGE_WITHOUT_APK',                   // environment
          {
            onConnect: handleConnect,
            onError: handleSDKError
          }
        );
      } catch(e) {
        log('SamsungPay.connect threw: ' + e.message, 'err');
        setStatus('SDK connect error — see log', 'error');
      }
    }

    function handleConnect(status) {
      log('SamsungPay.connect → status: ' + JSON.stringify(status), 'ok');
      setStatus('SDK connected · Ready', 'success');
    }

    function handleSDKError(err) {
      log('SDK error: ' + JSON.stringify(err), 'err');
      setStatus('SDK error: ' + (err?.errorCode || err), 'error');
    }

    // ─── Button Click → Launch Payment Sheet ───────────────────────────────────
    $('samsung-pay-btn').addEventListener('click', () => {
      const serviceId = $('service-id').value.trim();
      if (!serviceId) {
        setStatus('Please enter your Service ID', 'error');
        log('Blocked: Service ID is empty.', 'warn');
        return;
      }

      const amount    = parseFloat($('amount').value || '10.00').toFixed(2);
      const currency  = $('currency').value;
      const merchant  = $('merchant-name').value || 'Test Merchant';
      const orderRef  = $('order-ref').value || $('order-ref').placeholder;

      log(`Launching payment sheet…`, 'info');
      log(`  merchant=${merchant} | amount=${amount} ${currency} | ref=${orderRef}`, 'info');
      setStatus('Opening Samsung Pay…', 'info');

      const paymentRequest = {
        version: '2',
        serviceId: serviceId,
        protocol: 'PROTOCOL_3DS',   // change to PROTOCOL_MPQR for QR
        orderNumber: orderRef,
        merchant: {
          name: merchant,
          url: window.location.origin,
          countryCode: 'AE'           // change per your market
        },
        amount: {
          option: 'FORMAT_TOTAL_ESTIMATED_AMOUNT',
          currency: currency,
          total: amount
        },
        allowedBrands: ['MASTERCARD', 'VISA', 'AMEX'],
        productItems: [{
          itemId:   '001',
          itemName: 'Test Item',
          qty:       '1',
          amount:    amount
        }]
      };

      log('Payment request object:', 'info');
      logJSON('paymentRequest', paymentRequest);

      try {
        SamsungPay.connect(
          serviceId,
          'TEST',
          'STAGE_WITHOUT_APK',
          {
            onConnect: () => {
              SamsungPay.requestPayment(
                paymentRequest,
                {
                  onSuccess:  handlePaymentSuccess,
                  onError:    handlePaymentError,
                  onComplete: handlePaymentComplete
                }
              );
            },
            onError: handleSDKError
          }
        );
      } catch(e) {
        log('requestPayment threw: ' + e.message, 'err');
        setStatus('Payment request failed — see log', 'error');
      }
    });

    // ─── Payment Callbacks ─────────────────────────────────────────────────────
    function handlePaymentSuccess(response) {
      setStatus('Payment credentials received ✓', 'success');
      log('══ PAYMENT SUCCESS ══', 'ok');
      logJSON('Full response', response);

      // Drill into the credential
      if (response?.paymentCredential) {
        log('── Credential Detail ──', 'ok');
        logJSON('paymentCredential', response.paymentCredential);
      }
      if (response?.paymentCredential?.3DSData) {
        log('── 3DS Data (send this to MPGS) ──', 'ok');
        logJSON('3DSData', response.paymentCredential['3DSData']);
      }
    }

    function handlePaymentError(error) {
      setStatus('Payment error: ' + (error?.errorCode || 'unknown'), 'error');
      log('══ PAYMENT ERROR ══', 'err');
      logJSON('error', error);
    }

    function handlePaymentComplete(status) {
      log('══ PAYMENT COMPLETE callback ══', 'info');
      logJSON('status', status);
    }
  </script>
</body>
</html>
