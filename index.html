<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Samsung Pay · Integration Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://img.mpay.samsung.com/gsmpi/sdk/samsungpay_web_sdk.js"></script>
  <style>
    :root {
      --bg:#f0f0ed; --surface:#fff; --border:#e0dfd8; --border-dk:#c8c7bf;
      --accent:#1428a0; --text:#1a1a18; --muted:#888880; --faint:#b8b8b0;
      --ok:#1a7a4a; --ok-bg:#edf7f1; --ok-bd:#a8dfc0;
      --err:#c0392b; --err-bg:#fdf0ee; --err-bd:#f0b8b0;
      --warn:#a06010; --warn-bg:#fdf6ec; --warn-bd:#e8c070;
      --info-bg:#eef2fc; --info-bd:#c0cff8; --info-txt:#1a3080;
      --prod-bg:#e6f4ea; --prod-bd:#a8dfc0; --prod-txt:#1a7a4a;
      --mono:'DM Mono',monospace; --sans:'DM Sans',sans-serif; --r:10px;
    }
    /* ... (all your existing styles remain unchanged) ... */

    /* Production badge */
    #env-badge.prod{background:var(--prod-bg);border:1px solid var(--prod-bd);color:var(--prod-txt)}
    #env-badge.prod::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--prod-txt)}
  </style>
</head>
<body>
<!-- Header -->
<div class="hdr">
  <div>
    <div class="hdr-title">Samsung Pay <span>Test</span></div>
    <div class="hdr-sub">Web Checkout SDK v3.3 · Noqodi / MPGS</div>
  </div>
  <span id="env-badge" class="without-apk">STAGE_WITHOUT_APK</span>
</div>

<!-- Config card -->
<div class="card">
  <div class="card-hdr">
    <span class="card-lbl">Service &amp; Transaction Config</span>
    <button id="reinit-btn" onclick="reinit()">↺ Re-init SDK</button>
  </div>
  <div class="card-body">
    <!-- Environment selector -->
    <div class="field">
      <label>Environment <span style="color:var(--err);font-weight:400">(PROD = real payments!)</span></label>
      <select id="env" onchange="onEnvChange()">
        <option value="STAGE_WITHOUT_APK" selected>STAGE_WITHOUT_APK — simulate without device</option>
        <option value="STAGE">STAGE — real Samsung Wallet test app on device</option>
        <option value="PRODUCTION">PRODUCTION — LIVE environment (real money)</option>
      </select>
    </div>

    <!-- Rest of your form fields (sid, merchant name, amount, etc.) remain exactly the same -->
    <div class="row2">
      <div class="field" style="grid-column:1/-1">
        <label>Service ID <span class="req">*</span></label>
        <input id="sid" type="text" value="5b71cb6aa0fb4a48aceba7"
               placeholder="Service ID from Samsung Pay portal" autocomplete="off"
               oninput="updatePreview()"/>
      </div>
    </div>
    <!-- ... (merchant name, amount, currency, country, brands, preview) ... -->
    <div class="preview-wrap">
      <div class="preview-lbl">Exact objects that will be sent to Samsung Pay</div>
      <pre id="preview">Loading…</pre>
    </div>
  </div>

  <!-- Pay section remains the same -->
  <div class="pay-sec">
    <div id="spay-container"></div>
    <button id="fallback-btn" disabled>
      <svg width="20" height="14" viewBox="0 0 20 14" fill="none">
        <path d="M3 7Q6 1 10 7Q13 13 17 7" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M6 7Q8 3 10 7Q12 11 14 7" stroke="white" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".7"/>
      </svg>
      Samsung Pay
    </button>
    <div class="sdk-line">
      <span class="dot spin" id="sdk-dot"></span>
      <span id="sdk-txt">Initializing SDK…</span>
    </div>
  </div>
</div>

<!-- The rest of your HTML (alert, diagnosis, credential, log) remains unchanged -->

<script>
// ─── Utilities + existing functions (unchanged) ─────────────────────────────

const $ = id => document.getElementById(id);
const ts = () => new Date().toLocaleTimeString('en-GB', {hour12:false});
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ... (keep all your log, setAlert, setSdk, get* functions exactly as before) ...

// ─── Updated Environment handling ───────────────────────────────────────────
function getEnv() { return $('env').value; }

function onEnvChange() {
  const env = getEnv();
  const badge = $('env-badge');

  if (env === 'STAGE_WITHOUT_APK') {
    badge.className = 'without-apk';
    badge.textContent = 'STAGE_WITHOUT_APK';
  } else if (env === 'STAGE') {
    badge.className = 'stage';
    badge.textContent = 'STAGE';
  } else if (env === 'PRODUCTION') {
    badge.className = 'prod';
    badge.textContent = 'PRODUCTION';
  }

  updatePreview();

  if (env === 'PRODUCTION') {
    log('⚠️ SWITCHED TO PRODUCTION ENVIRONMENT — REAL PAYMENTS WILL BE PROCESSED!', 'err');
    setAlert('You are now in PRODUCTION. All transactions are LIVE and will charge real cards.', 'err');
  } else {
    log(`Environment changed to: ${env}`, 'warn');
    setAlert(`Environment changed to ${env}. Click ↺ Re-init SDK to apply.`, 'warn');
  }

  log('Click ↺ Re-init SDK to apply the new environment.', 'warn');
}

// ─── SDK init (no change needed — it already supports "PRODUCTION") ────────
function initSDK() {
  if (typeof SamsungPay === 'undefined') {
    setSdk('SDK not available', 'err'); return;
  }

  const env = getEnv();
  const sid = getSid();

  log(`new SamsungPay.PaymentClient({ environment: "${env}" })`, 'info');
  client = new SamsungPay.PaymentClient({ environment: env });

  // ... rest of your initSDK and doIsReadyToPay remains exactly the same ...
}

// Keep all other functions (reinit, doIsReadyToPay, onPay, handleCred, etc.) unchanged.
// They already use getEnv() so they will automatically use PRODUCTION when selected.

window.addEventListener('load', () => {
  // ... your existing load code ...
  updatePreview();
  initSDK();
});
</script>
</body>
</html>
